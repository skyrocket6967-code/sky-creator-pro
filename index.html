<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Sky Creator Pro is a creator workflow tool for video planning, thumbnail drafts, and project organization."
    />
    <script src="/config.js"></script>
    <title>Sky Creator Pro</title>
  </head>
  <body>
    <div id="root">
      <main
        style="
          min-height: 100vh;
          display: grid;
          place-items: center;
          background: #0f0f12;
          color: #f7f3ea;
          font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        "
      >
        <section style="max-width: 420px; padding: 28px; border: 1px solid #30313a; border-radius: 8px; background: #17181d">
          <p style="margin: 0 0 12px; color: #54d6c4; font-size: 12px; font-weight: 800; text-transform: uppercase">
            Sky Creator Pro
          </p>
          <h1 style="margin: 0 0 10px; font-size: 32px; line-height: 1.05">Loading creator workspace</h1>
          <p style="margin: 0; color: #b2adba; line-height: 1.6">
            If this screen stays here, close Sky Creator Pro and open it again from the latest installer.
          </p>
        </section>
      </main>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
